<html>
    <head>
        <title>User Search</title>
    </head>
    <body>
        <h1>User Search Tool</h1>
        <form id="searchForm">
            <input type="text" id="searchTerm" placeholder="Enter search term" required />
            <button type="submit">Search</button><br>
            <span>Max number of results:</span> <input type="number" id="resultCount" value="10" min="1" max="100" /><br>
            <span>From year:</span> <input type="number" id="fromYear" value="1700" min="1" /> <span>to year:</span> <input type="number" id="toYear" value = "3000" /><br>
            <span>Include theses with unknown year of publication:</span> <input type="checkbox" id="includeUnknown" checked /><br>
        </form>
        <p id="message"></p>
        <ul id="results"></ul>
    </body>
    <script src="index.js"></script>
</html>
