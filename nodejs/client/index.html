<html>
    <head>
        <title>Durham E-Theses Search</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class = "container2">
            <div class = "row">
                <div class = "col-3">
                    <div class = "container2">
                        <h1>Durham E-Theses Search Tool</h1>
                        <form id="searchForm">
                            <input type="text" id="searchTerm" placeholder="Enter search term" />
                            <button type="submit" id = "searchBtn">Search</button><br>
                            <span>Max number of results:</span> <input type="number" id="resultCount" value="10" min="1" max="100" /><br>
                            <h5>Filters</h5>
                            <span>From year:</span> <input type="number" id="fromYear" value="1700" min="1" max="3000" /><br>
                            <span>To year:</span> <input type="number" id="toYear" value = "3000" min="1" max="3000" /><br>
                            <span>Include theses with unknown year of publication:</span> <input type="checkbox" id="includeUnknown" checked /><br>
                            <span>Author:</span> <input type="text" id="author" placeholder="Enter author name" /><br>
                            <span>Include theses from all subject disciplines:</span> <input type="checkbox" id="includeAllDepts" checked /><br>
                            <div id="departmentFilters" class="checkbox-group">
                                <h6>Select Subjects:</h6>
                            </div>
                            <span id = "unknownDeptSpan"><span>Include theses with unknown department:</span>&nbsp; <input type="checkbox" class = "form-check-input dept-checkbox" id="includeUnknownDept" value = ""/></span><br>
                        </form>
                    </div>

                </div>
                <div class = "col-9">
                    <div id = "resultsContainer" class = "container2">
                        <div id = "results" class = "accordion"></div>
                    </div>
                </div>
            </div>
        </div>
        <br><br>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</html>
