<html>
    <head>
        <title>User Search</title>
    </head>
    <body>
        <h1>User Search Tool</h1>
        <form id="searchForm">
            <input type="text" id="searchTerm" placeholder="Enter search term" required />
            <button type="submit">Search</button><br>
            <span>Number of results:</span> <input type="number" id="resultCount" value="10" min="1" max="100"  />
        </form>
        <p id="message"></p>
        <ul id="results"></ul>
    </body>
    <script src="index.js"></script>
</html>
